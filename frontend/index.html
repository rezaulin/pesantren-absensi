<!DOCTYPE html>
<html lang="id">
<head>
  <!-- 
    ============================================
    SISTEM ABSENSI PESANTREN - HALAMAN UTAMA
    ============================================
    File ini adalah Single Page Application (SPA) yang menangani
    semua halaman dalam satu file HTML.
    Halaman: Login, Dashboard, Absensi, Rekap, Data Santri, Data Kamar
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2E7D32">
  <title>Sistem Absensi Pesantren</title>
  
  <!-- Google Fonts - Roboto untuk Material Design -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <!-- CSS Custom -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ============================================
       CONTAINER UTAMA APLIKASI
       Semua halaman akan dirender di dalam container ini
       ============================================ -->
  <div id="app">
    <!-- Loading indicator saat aplikasi dimuat -->
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-spinner"></div>
      <p>Memuat aplikasi...</p>
    </div>
  </div>

  <!-- JavaScript - Urutan pemuatan penting! -->
  <!-- 1. API Helper - fungsi dasar untuk komunikasi dengan backend -->
  <script src="js/api.js"></script>
  <!-- 2. Auth Module - handler autentikasi dan login -->
  <script src="js/auth.js"></script>
  <!-- 3. Dashboard - halaman utama dengan menu grid -->
  <script src="js/dashboard.js"></script>
  <!-- 4. Absensi - halaman form absensi santri -->
  <script src="js/absensi.js"></script>
  <!-- 5. Rekap - halaman rekap absensi -->
  <script src="js/rekap.js"></script>
  <!-- 6. App Router - router SPA, harus dimuat terakhir -->
  <script src="js/app.js"></script>
</body>
</html>
